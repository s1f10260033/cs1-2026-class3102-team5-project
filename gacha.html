    <h1>🎰 今日の運勢ガチャ</h1>

  <button id="drawBtn" class="btn">ガチャを回す</button>

  <div id="cardContainer" class="card-container"></div>

  <script>
    window.addEventListener("DOMContentLoaded", () => {

      const btn = document.getElementById("drawBtn");
      const container = document.getElementById("cardContainer");

      const data = [
        {
          title: "🔮 今日の運勢",
          list: ["大大吉","大吉", "中吉","吉","小吉","凶","大凶","大大凶"]
        },
        {
          title: "🍀 ラッキーアイテム",
          list: ["ワイヤレスイヤホン", "水筒", "ノート","パソコン","ボール","シャープペン","腕時計","iPad"]
        },
        {
          title: "💬 名言",
          list: ["継続は力なり", "失敗は成功のもと", "今日を全力で","努力は裏切らない","人生とは今日一日のことである","自分の愛する人生を生きろ","成長の最大の源は選択にある","人生は公平ではない"]
        },
        {
          title: "💡 ライフハック",
          list: ["冷凍ご飯はラップで小分け保存", "パンの耳は冷凍してラスクに", "カーペットのシミは氷で固めてから削る","窓ガラスは新聞紙で拭くとピカピカになる","バッグの中は小分けケースで整理","書類はクリアファイルで分けてラベルをつける","コインを使ってネジを回せる","靴のかかとに絆創膏を貼ると靴擦れ防止","蚊に刺されたかゆみはドライヤーの温風で和らぐ","睡眠前のスマホは睡眠の質を下げる"]
        }
      ];

      function createCards() {
        container.innerHTML = "";

        data.forEach(item => {
          const value = item.list[Math.floor(Math.random() * item.list.length)];

          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <div class="card-inner">
              <div class="card-face card-back">${item.title}</div>
              <div class="card-face card-front">
               <div>
                 <div>${item.title}</div>
                   <div style="margin-top:10px;">${value}</div>
                </div>
              </div>
            </div>
          `;

          card.addEventListener("click", () => {
            card.classList.toggle("flipped");
          });

          container.appendChild(card);
        });
      }

      btn.addEventListener("click", createCards);

    });
  </script>
